modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
logoFile = "ImmersiveFixes_logo.png"
credits = "Thanks to other contributors: tgstyle, Developer of Immersive Technology"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies."${mod_id}"]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId="immersiveengineering"
mandatory = true
versionRange = "[1.20.1-10.1.0-171,]"
ordering = "NONE"
side = "BOTH"

[[mixins]]
config = "immersivefixes.mixins.json"